<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>M3U8 Web Player</title>
    <!-- Include HLS.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #1a1a1a; color: white; }
        .container { text-align: center; margin-top: 50px; }
        video { width: 100%; max-width: 800px; border: 2px solid #444; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Colors Rishtey - Live Stream</h2>
    <video id="video" controls></video>
</div>

<script>
  var video = document.getElementById('video');
  var videoSrc = 'http://103.175.73.12:8080/live/12/12_0.m3u8';

  if (Hls.isSupported()) {
    var hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play();
    });
  }
  // For Safari/iOS which support HLS natively
  else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
    video.addEventListener('loadedmetadata', function() {
      video.play();
    });
  }
</script>

</body>
</html>

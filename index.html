<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV for VLC Mobile</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; text-align: center; }
        .instruction-box { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9em; }
        .channel-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: #ff8800; color: black; font-weight: bold; 
            text-decoration: none; border-radius: 8px; border: none;
        }
    </style>
</head>
<body>

    <h2>Select a Channel</h2>
    
    <div class="instruction-box">
        Step 1: Download <b>VLC for Android/iOS</b>.<br>
        Step 2: Tap a channel below to start watching instantly.
    </div>

    <div id="list"></div>
<script>
    // Your JSON data
    const channels = [
        { "name": "Colors Rishtey", "url": "http://103.175.73.12:8080/live/270/270_0.m3u8" }
    ];

    const listDiv = document.getElementById('list');

    channels.forEach(ch => {
        const btn = document.createElement('a');
        btn.className = 'channel-btn';
        btn.innerText = "Play in MX Player: " + ch.name;
        
        // MX Player Intent Format
        // package=com.mxtech.videoplayer.ad is for the Free version
        // S.title sets the name inside the player
        const mxIntent = `intent:${ch.url}#Intent;package=com.mxtech.videoplayer.ad;S.title=${encodeURIComponent(ch.name)};end`;
        
        btn.href = mxIntent;
        listDiv.appendChild(btn);
    });
</script>




</body>
</html>
